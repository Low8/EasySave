name: Build Check
on:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Build
        run: dotnet build EasySave.Console/EasySave.Console.csproj -c Release

      - name: Build Tests
        run: dotnet build EasySave.Tests/EasySave.Tests.csproj -c Release

      - name: Test
        run: dotnet test EasySave.Tests/EasySave.Tests.csproj -c Release --no-build --logger "console;verbosity=normal"
