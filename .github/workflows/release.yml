name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag (ex: v1.1.1)'
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Build Windows
        run: dotnet publish EasySave.Console/EasySave.Console.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -o ./out/windows

      - name: Build Linux
        run: dotnet publish EasySave.Console/EasySave.Console.csproj -c Release -r linux-x64 --self-contained true -p:PublishSingleFile=true -o ./out/linux

      - name: Build macOS
        run: dotnet publish EasySave.Console/EasySave.Console.csproj -c Release -r osx-x64 --self-contained true -p:PublishSingleFile=true -o ./out/macos

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          files: |
            ./out/windows/*.exe
            ./out/linux/*
            ./out/macos/*
